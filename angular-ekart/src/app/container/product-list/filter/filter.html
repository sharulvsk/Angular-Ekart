<div class="filter--product">
    <span>Filter : </span>
    <input type="radio" name="filter" value="all" [(ngModel)]="selectedRadioButton" (change)="onRadioChange()"/>
    <span>{{'All ('+all+')'}}</span>
    <input type="radio" name="filter" value="true" [(ngModel)]="selectedRadioButton" (change)="onRadioChange()"/>
    <span>{{'In Stock ('+inStock+')'}}</span>
    <input type="radio" name="filter" value="false" [(ngModel)]="selectedRadioButton" (change)="onRadioChange()"/>
    <span>{{'Out of Stock ('+outOfStock+')'}}</span>
</div>
