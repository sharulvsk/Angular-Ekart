<app-filter 
[all]="totalproducts" 
[inStock]="totalproductsInStock" 
[outOfStock]="totalproductsOutOfStock"
(selectedRadioChange)="onFilterChange($event)"
></app-filter>
<div class="ekart--products--container">
    <div *ngFor="let prod of products">
        <app-product [product]="prod" *ngIf="searchText===''||prod.name.toLowerCase().includes(searchText.toLowerCase())"></app-product>
    </div>
</div>
